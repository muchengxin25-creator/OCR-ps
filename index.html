      link.download = `mosaic_${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // 导出学习数据
    exportDataBtn.addEventListener('click', function() {
      if (typeof window.downloadLearnedData === 'function') {
        window.downloadLearnedData();
        statusBadge.innerText = '📥 学习数据已导出为 learn_data.js';
        updateDataStats();
      }
    });

    // 导入学习数据
    importDataBtn.addEventListener('click', function() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.js,.json';
      input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
          try {
            let content = event.target.result;
            // 如果是 JS 文件，提取 JSON 数据
            if (file.name.endsWith('.js')) {
              const match = content.match(/LEARNED_DATA\s*=\s*(\{[\s\S]*?\});/);
              if (match) {
                content = match[1];
              }
            }
            const data = JSON.parse(content);
            if (typeof window.importLearnedData === 'function') {
              window.importLearnedData(data);
              statusBadge.innerText = '📤 学习数据已导入';
              updateDataStats();
              // 导入后自动重新识别
              if (imageLoaded) {
                setTimeout(() => {
                  markedRegions = [];
                  markBtn.click();
                }, 500);
              }
            }
          } catch (err) {
            statusBadge.innerText = '⚠️ 导入失败：文件格式错误';
            console.error('导入失败:', err);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    });

    // 清除学习数据
    clearDataBtn.addEventListener('click', function() {
      if (confirm('确定要清除所有学习数据吗？此操作不可撤销。')) {
        if (typeof window.clearAllLearnedData === 'function') {
          window.clearAllLearnedData();
          statusBadge.innerText = '🗑️ 所有学习数据已清除';
          updateDataStats();
          // 清除后自动重新识别
          if (imageLoaded) {
            setTimeout(() => {
              markedRegions = [];
              markBtn.click();
            }, 500);
          }
        }
      }
    });

    // 更新学习数据统计
    function updateDataStats() {
      if (typeof window.getLearnedDataStats === 'function') {
        const stats = window.getLearnedDataStats();
        const total = stats.whitelistCount + stats.blacklistCount + stats.keywordsCount + stats.patternsCount;
        dataStats.textContent = `${total} 条规则`;
        if (stats.hasDefaultData) {
          dataStats.textContent += ' (含默认)';
        }
      }
    }

    // 初始化时更新统计
    updateDataStats();

    function loadGithubConfig() {
      const token = localStorage.getItem('github_token');
      const repo = localStorage.getItem('github_repo');
      if (token && repo) {
        githubToken.value = token;
        githubRepo.value = repo;
        pushToGithubBtn.disabled = false;
        githubConfig.style.display = 'none';
        return true;
      }
      return false;
    }

    function saveGithubConfig() {
      const token = githubToken.value.trim();
      const repo = githubRepo.value.trim();
      if (token && repo) {
        localStorage.setItem('github_token', token);
        localStorage.setItem('github_repo', repo);
        pushToGithubBtn.disabled = false;
        githubConfig.style.display = 'none';
        statusBadge.innerText = '💾 GitHub 配置已保存';
      } else {
        statusBadge.innerText = '⚠️ 请填写完整的 GitHub Token 和仓库地址';
      }
    }

    pushToGithubBtn.addEventListener('click', function() {
      if (!loadGithubConfig()) {
        githubConfig.style.display = 'block';
        statusBadge.innerText = '⚠️ 请先配置 GitHub Token 和仓库地址';
        return;
      }
      pushToGithub();
    });

    saveGithubConfigBtn.addEventListener('click', saveGithubConfig);

    async function pushToGithub() {
      const token = localStorage.getItem('github_token');
      const repo = localStorage.getItem('github_repo');
      const content = typeof window.exportLearnedData === 'function' ? window.exportLearnedData() : '';
      
      if (!token || !repo || !content) {
        statusBadge.innerText = '⚠️ 配置不完整';
        return;
      }

      statusBadge.innerText = '🚀 正在同步到 GitHub...';
      pushToGithubBtn.disabled = true;

      try {
        const filePath = 'learn_data.js';
        const apiUrl = `https://api.github.com/repos/${repo}/contents/${filePath}`;

        const response = await fetch(apiUrl, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        let sha = null;
        if (response.status === 200) {
          const data = await response.json();
          sha = data.sha;
        }

        const base64Content = btoa(unescape(encodeURIComponent(content)));

        const commitData = {
          message: `更新学习数据 - ${new Date().toLocaleString()}`,
          content: base64Content,
          branch: 'main'
        };

        if (sha) {
          commitData.sha = sha;
        }

        const commitResponse = await fetch(apiUrl, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(commitData)
        });

        if (commitResponse.ok) {
          statusBadge.innerText = '✅ 已成功同步到 GitHub';
          alert('🎉 同步成功！\n\n学习数据已成功提交到 GitHub 仓库。\n其他用户刷新页面即可看到更新。');
        } else {
          const errorData = await commitResponse.json();
          statusBadge.innerText = `❌ 同步失败: ${errorData.message || '未知错误'}`;
          console.error('GitHub API 错误:', errorData);
        }
      } catch (error) {
        statusBadge.innerText = `❌ 同步失败: ${error.message}`;
        console.error('同步错误:', error);
      } finally {
        pushToGithubBtn.disabled = false;
      }
    }

    loadGithubConfig();

    blurLevelInput.addEventListener('input', function() {
      blurValueLabel.textContent = this.value;
    });

    // 支持回车触发标记
    customKeywordInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        markedRegions = [];
        markBtn.click();
      }
    });

    // 输入关键字后自动重新识别（带防抖）
    let keywordInputTimer = null;
    customKeywordInput.addEventListener('input', function() {
      if (keywordInputTimer) clearTimeout(keywordInputTimer);
      keywordInputTimer = setTimeout(() => {
        if (imageLoaded && this.value.trim()) {
          markedRegions = [];
          markBtn.click();
        }
      }, 800);
    });

    updateUI();
    canvasWrapper.classList.remove('active');
  })();
</script>
